services:
  postgres:
    container_name: qintopia-postgres
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    environment:
      POSTGRES_USER: qintopia
      POSTGRES_PASSWORD: qintopia
      POSTGRES_DB: qintopia
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qintopia -d qintopia"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - qintopia-postgres:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgres://qintopia:qintopia@postgres:5432/qintopia
      PORT: 4100
      WEB_ORIGIN: http://localhost:4100
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      BEARER_AUTH_RATE_LIMIT_MAX: ${BEARER_AUTH_RATE_LIMIT_MAX:-600}
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-4100}:4100"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health/ready').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  qintopia-postgres:
